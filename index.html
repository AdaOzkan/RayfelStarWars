<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Crisis Command | Advanced Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen w-screen flex flex-col justify-between antialiased selection:bg-zinc-800 selection:text-white">

    <div id="login-screen" class="absolute inset-0 bg-[#030303] z-50 flex flex-col justify-center items-center p-4">
        <div class="max-w-md w-full bg-[#0a0a0f] border border-zinc-800 p-8 text-center shadow-2xl">
            <h1 class="font-starjedi text-2xl md:text-3xl text-white mb-2">GALACTIC COMMAND</h1>
            <p class="text-xs text-zinc-500 uppercase tracking-widest mb-6">SECURE LOGIN REQUIRED</p>
            
            <div class="mb-6 text-left">
                <label class="text-[10px] font-orbitron text-zinc-500 block uppercase tracking-wider mb-1.5">Enter Security Clearance Key</label>
                <input type="password" id="role-password" placeholder="••••••••••••••••" class="w-full bg-zinc-950 border border-zinc-800 text-white px-3 py-2.5 text-xs focus:outline-none focus:border-zinc-600 font-mono tracking-widest text-center">
                <div id="login-error" class="text-red-500 text-[11px] font-mono mt-1 text-center hidden">Invalid Security Clearance Key!</div>
            </div>

            <div class="space-y-3">
                <button onclick="attemptLogin('sith')" class="w-full py-2.5 bg-transparent border border-zinc-800 text-zinc-300 font-orbitron tracking-wider uppercase text-xs hover:border-red-600 hover:text-red-500 transition-all">Sith Order</button>
                <button onclick="attemptLogin('jedi')" class="w-full py-2.5 bg-transparent border border-zinc-800 text-zinc-300 font-orbitron tracking-wider uppercase text-xs hover:border-cyan-500 hover:text-cyan-400 transition-all">Jedi Republic</button>
                <button onclick="attemptLogin('mod')" class="w-full py-2.5 bg-zinc-900/50 border border-zinc-700 text-white font-orbitron tracking-wider uppercase text-xs hover:bg-zinc-900 hover:border-amber-500 transition-all">Moderator Entry</button>
                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-zinc-900"></div>
                    <span class="flex-shrink mx-4 text-zinc-600 text-[9px] uppercase tracking-widest">or</span>
                    <div class="flex-grow border-t border-zinc-900"></div>
                </div>
                <button onclick="attemptLogin('viewer')" class="w-full py-2 bg-transparent border border-zinc-900 text-zinc-600 font-orbitron tracking-wider uppercase text-[11px] hover:border-zinc-700 hover:text-zinc-400 transition-all">Unrestricted Viewer Access</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden w-full h-full flex flex-col md:flex-row overflow-hidden relative">
        
        <div class="w-full md:w-80 bg-[#07070a] border-b md:border-r border-zinc-800/80 flex flex-col h-1/3 md:h-full shrink-0">
            <div class="p-4 border-b border-zinc-800/80 flex justify-between items-center bg-[#0a0a0f]">
                <span id="panel-badge" class="font-orbitron text-xs px-2 py-1 tracking-wider uppercase">OFFLINE</span>
                <div class="flex items-center gap-2">
                    <button id="mod-clear-btn" onclick="clearComms()" class="hidden text-[10px] bg-red-950/40 border border-red-900 hover:bg-red-900 hover:text-white text-red-400 px-2 py-0.5 font-orbitron transition-all">🧹 CLEAR COMMS</button>
                    <span class="text-xs text-zinc-500 font-mono" id="live-clock">00:00:00</span>
                </div>
            </div>
            <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-3 font-mono text-xs"></div>
            <div id="chat-input-area" class="p-3 bg-[#0a0a0f] border-t border-zinc-800/80 space-y-2">
                <div class="flex gap-2">
                    <input type="text" id="msg-input" placeholder="Transmit message..." onkeydown="if(event.key==='Enter') sendMessage('default')" class="flex-1 bg-zinc-950 border border-zinc-800 text-white px-3 py-2 text-xs focus:outline-none focus:border-zinc-600 font-mono">
                    <button onclick="sendMessage('default')" class="bg-zinc-900 border border-zinc-700 text-zinc-300 px-4 py-2 text-xs uppercase font-orbitron hover:bg-zinc-800 transition-colors">SEND</button>
                </div>
                <button id="mod-direct-btn" onclick="sendMessage('mod')" class="w-full py-1.5 text-[10px] uppercase font-orbitron tracking-wider text-zinc-500 hover:text-amber-500 bg-zinc-950/50 border border-zinc-900 transition-all text-center">
                    📡 DIRECT MESSAGE TO MODERATOR
                </button>
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-[#020203] relative h-2/3 md:h-full">
            <div class="p-3 bg-[#0a0a0f] border-b border-zinc-800/80 flex justify-between items-center z-10 select-none">
                <div id="tools-box" class="flex items-center gap-1.5 text-xs">
                    <button id="tool-pan" onclick="setTool('pan')" class="px-3 py-1 bg-zinc-900 border border-zinc-600 font-orbitron uppercase text-white tracking-wider rounded">PAN</button>
                    <button id="tool-draw" onclick="setTool('draw')" class="px-3 py-1 bg-transparent border border-zinc-800 font-orbitron uppercase text-zinc-500 tracking-wider rounded">DRAW</button>
                    <button id="tool-mark" onclick="setTool('mark')" class="px-3 py-1 bg-transparent border border-zinc-800 font-orbitron uppercase text-zinc-500 tracking-wider rounded">MARK</button>
                    <button id="tool-zone" onclick="setTool('zone')" class="hidden px-3 py-1 bg-transparent border border-zinc-800 font-orbitron uppercase text-amber-600 tracking-wider rounded">ZONE</button>
                    <button id="mod-clear-map-btn" onclick="clearMap()" class="hidden px-3 py-1 bg-red-950/40 border border-red-900 hover:bg-red-950 hover:border-red-600 font-orbitron uppercase text-red-400 tracking-wider rounded transition-all">🧹 CLEAR MAP</button>

                    <div class="relative ml-2 w-40 md:w-56" id="search-container">
                        <input type="text" id="system-search" placeholder="Search System..." class="w-full bg-zinc-950 border border-zinc-700 text-zinc-300 px-2 py-1 text-[10px] focus:outline-none focus:border-amber-500 font-orbitron rounded">
                        <div id="search-results" class="absolute w-full mt-1 bg-zinc-950 border border-zinc-700 rounded max-h-48 overflow-y-auto hidden z-50 shadow-xl"></div>
                    </div>
                </div>

                <div id="action-alert" class="hidden px-4 py-1 text-xs font-orbitron font-bold uppercase animate-pulse"></div>
                
                <div class="flex items-center gap-1 bg-zinc-950 p-0.5 border border-zinc-800/60">
                    <button onclick="adjustZoom(-0.15)" class="w-7 h-7 text-sm font-mono text-zinc-400 hover:bg-zinc-900">-</button>
                    <span id="zoom-indicator" class="text-[11px] font-mono w-14 text-center text-zinc-500">100%</span>
                    <button onclick="adjustZoom(0.15)" class="w-7 h-7 text-sm font-mono text-zinc-400 hover:bg-zinc-900">+</button>
                    <button onclick="resetZoom()" class="px-2 h-7 text-[10px] uppercase font-orbitron text-zinc-500 border-l border-zinc-850 hover:bg-zinc-900">RESET</button>
                </div>
            </div>

            <div id="map-viewport" class="flex-1 overflow-hidden relative map-viewport cursor-grab active:cursor-grabbing">
                <div id="map-transformer" class="absolute origin-top-left transition-transform duration-75 ease-out" style="transform: translate(0px, 0px) scale(1);">
                    <img id="galaxy-map" src="star_wars_galaxy_map.jpeg" alt="Galaxy Map" class="max-w-none block pointer-events-none select-none" onload="setupMapLayer()">
                    <canvas id="drawing-canvas" class="absolute inset-0 z-10 pointer-events-none"></canvas>
                    <div id="zone-layer" class="absolute inset-0 z-15 pointer-events-none"></div>
                    <div id="entity-layer" class="absolute inset-0 z-20 pointer-events-none"></div>
                </div>
            </div>

            <div id="context-menu" class="hidden absolute bg-[#0a0a0f] border border-zinc-700 z-50 shadow-2xl p-2 min-w-[160px] rounded-lg">
                <div id="cm-title" class="text-xs font-orbitron border-b border-zinc-800 pb-1 mb-2 text-white truncate">Title</div>
                <div id="cm-actions" class="flex flex-col gap-1"></div>
            </div>

        </div>

        <div id="right-panel" class="w-full md:w-80 bg-[#07070a] border-t md:border-l border-zinc-800/80 flex flex-col h-1/3 md:h-full shrink-0 relative">
            <div id="right-panel-resizer" class="hidden md:block absolute left-0 top-0 bottom-0 w-1 cursor-col-resize hover:bg-amber-500 bg-transparent z-30"></div>
            
            <div class="p-4 border-b border-zinc-800/80 bg-[#0a0a0f]">
                <h3 class="font-starjedi text-xs tracking-wider text-amber-500 mb-3">FORCE STATS</h3>
                <div id="stats-container" class="grid grid-cols-2 gap-2 text-[11px] font-mono"></div>
            </div>

            <div class="p-4 border-b border-zinc-800/80 bg-[#0a0a0f]">
                <h3 class="font-starjedi text-sm tracking-wider text-zinc-400">ACTIVE ENTITIES</h3>
            </div>
            <div class="flex-1 overflow-y-auto">
                <table class="w-full text-left border-collapse text-xs font-mono">
                    <thead>
                        <tr class="bg-zinc-950 text-zinc-500 border-b border-zinc-900">
                            <th class="p-3 font-normal">ENTITY</th>
                            <th class="p-3 font-normal text-right">TYPE</th>
                        </tr>
                    </thead>
                    <tbody id="intel-table-body" class="divide-y divide-zinc-900 text-zinc-300"></tbody>
                </table>

                <div class="p-3 bg-zinc-950/40 font-starjedi text-xs tracking-wider text-zinc-400 border-t border-b border-zinc-900">PERSONNEL</div>
                <table class="w-full text-left border-collapse text-xs font-mono">
                    <thead>
                        <tr class="bg-zinc-950 text-zinc-500 border-b border-zinc-900">
                            <th class="p-3 font-normal">NAME</th>
                            <th class="p-3 font-normal text-right">STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="personnel-table-body" class="divide-y divide-zinc-900 text-zinc-300"></tbody>
                </table>
            </div>
        </div>

        <div id="mod-fab-container" class="fixed bottom-6 right-6 hidden flex-col items-end gap-4 z-50">
            <div id="mod-fab-menu" class="fab-menu bg-[#0a0a0f]/95 backdrop-blur-sm border-2 border-amber-600/50 p-6 w-80 shadow-[0_0_30px_rgba(217,119,6,0.3)]">
                <h4 class="font-starjedi text-amber-500 text-[11px] mb-4 border-b border-zinc-800 pb-2 text-center">DEPLOYMENT PANEL</h4>
                <select id="deploy-faction" class="w-full bg-zinc-900 border border-zinc-700 text-white text-xs p-2.5 mb-3 font-mono outline-none rounded-md">
                    <option value="sith">Sith Order</option>
                    <option value="jedi">Jedi Republic</option>
                </select>
                <select id="deploy-type" class="w-full bg-zinc-900 border border-zinc-700 text-white text-xs p-2.5 mb-3 font-mono outline-none rounded-md">
                    <option value="Military Base">Military Base 🏰</option>
                    <option value="Ship">Ship / Fighter 🚀</option>
                    <option value="Cruiser">Cruiser 🛸</option>
                    <option value="Weapon">Weapon Platform ⚔️</option>
                    <option value="Space Station">Space Station 🛰️</option>
                    <option value="Person">Person / Character 👤</option>
                </select>
                <input type="text" id="deploy-name" placeholder="Entity Name (e.g. Darth Vader)" class="w-full bg-zinc-950 border border-zinc-700 text-white px-3 py-2.5 mb-4 text-xs font-mono outline-none rounded-md">
                <button onclick="startDeployment()" class="w-full bg-amber-600/20 hover:bg-amber-600/40 border border-amber-600 text-amber-500 py-3 text-xs font-orbitron uppercase transition-all rounded-md">Select Location</button>
            </div>
            
            <button onclick="toggleModMenu()" id="fab-btn" class="w-16 h-16 bg-zinc-900 border-2 border-amber-600 rounded-full text-amber-500 text-3xl flex justify-center items-center hover:scale-110 hover:shadow-[0_0_20px_rgba(217,119,6,0.6)] transition-all">
                +
            </button>
        </div>

    </div>

    <script src="script.js"></script>
</html>
